volumes:
  jwt-keys:

services:
  # ==================== BASES DE DATOS ====================
  db-pacientes:
    image: postgres:16-alpine
    container_name: ms-pacientes-db
    environment:
      POSTGRES_DB: pacientes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pacientes_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinica-network

  db-atencion:
    image: postgres:16-alpine
    container_name: ms-atencion-db
    environment:
      POSTGRES_DB: atencion_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atencion_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinica-network

  db-recetas:
    image: postgres:16-alpine
    container_name: ms-recetas-db
    environment:
      POSTGRES_DB: recetas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recetas_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinica-network

  db-farmacia:
    image: postgres:16-alpine
    container_name: ms-farmacia-db
    environment:
      POSTGRES_DB: farmacia_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmacia_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinica-network

  db-cobros:
    image: postgres:16-alpine
    container_name: ms-cobros-db
    environment:
      POSTGRES_DB: cobros_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cobros_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinica-network

  db-notificaciones:
    image: postgres:16-alpine
    container_name: ms-notificaciones-db
    environment:
      POSTGRES_DB: notificaciones_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notificaciones_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - clinica-network

  # ==================== INFRAESTRUCTURA ====================
  config-server:
    build:
      context: .
      dockerfile: backend/ms-config-server/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - clinica-network

  registry-server:
    build:
      context: ./backend/ms-registry-server
      dockerfile: Dockerfile
    container_name: registry-server
    ports:
      - "8761:8761"
    networks:
      - clinica-network

  # ==================== MICROSERVICIOS ====================
  ms-pacientes:
    build:
      context: ./backend/ms-pacientes
      dockerfile: Dockerfile
    container_name: ms-pacientes
    restart: on-failure
    user: root
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-pacientes:5432/pacientes_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      NOTIFICACIONES_API_MP_REST_URL: http://ms-notificaciones:8080
      EUREKA_URL: http://registry-server:8761/eureka
      EUREKA_APP_NAME: ms-pacientes
      JWT_SIGN_KEY_PATH: file:/deployments/jwt/privateKey.pem
      JWT_PUBLIC_KEY_PATH: file:/deployments/jwt/publicKey.pem
    volumes:
      - jwt-keys:/deployments/jwt
    depends_on:
      db-pacientes:
        condition: service_healthy
    networks:
      - clinica-network

  ms-atencion:
    build:
      context: ./backend/ms-atencion
      dockerfile: Dockerfile
    container_name: ms-atencion
    restart: on-failure
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-atencion:5432/atencion_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      SAGA_COBROS_URL: http://ms-cobros:8080/eventos/saga
      EUREKA_URL: http://registry-server:8761/eureka
      EUREKA_APP_NAME: ms-atencion
      JWT_PUBLIC_KEY_PATH: file:/deployments/jwt/publicKey.pem
    volumes:
      - jwt-keys:/deployments/jwt
    depends_on:
      db-atencion:
        condition: service_healthy
    networks:
      - clinica-network

  ms-recetas:
    build:
      context: ./backend/ms-recetas
      dockerfile: Dockerfile
    container_name: ms-recetas
    restart: on-failure
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-recetas:5432/recetas_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      EUREKA_URL: http://registry-server:8761/eureka
      EUREKA_APP_NAME: ms-recetas
      JWT_PUBLIC_KEY_PATH: file:/deployments/jwt/publicKey.pem
    volumes:
      - jwt-keys:/deployments/jwt
    depends_on:
      db-recetas:
        condition: service_healthy
    networks:
      - clinica-network

  ms-farmacia:
    build:
      context: ./backend/ms-farmacia
      dockerfile: Dockerfile
    container_name: ms-farmacia
    restart: on-failure
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-farmacia:5432/farmacia_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      EUREKA_URL: http://registry-server:8761/eureka
      EUREKA_APP_NAME: ms-farmacia
      JWT_PUBLIC_KEY_PATH: file:/deployments/jwt/publicKey.pem
    volumes:
      - jwt-keys:/deployments/jwt
    depends_on:
      db-farmacia:
        condition: service_healthy
    networks:
      - clinica-network

  ms-cobros:
    build:
      context: ./backend/ms-cobros
      dockerfile: Dockerfile
    container_name: ms-cobros
    restart: on-failure
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-cobros:5432/cobros_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      SAGA_NOTIFICACIONES_URL: http://ms-notificaciones:8080/eventos/saga
      SAGA_ATENCION_URL: http://ms-atencion:8080/eventos/saga
      EUREKA_URL: http://registry-server:8761/eureka
      EUREKA_APP_NAME: ms-cobros
      JWT_PUBLIC_KEY_PATH: file:/deployments/jwt/publicKey.pem
    volumes:
      - jwt-keys:/deployments/jwt
    depends_on:
      db-cobros:
        condition: service_healthy
    networks:
      - clinica-network

  ms-notificaciones:
    build:
      context: ./backend/ms-notificaciones
      dockerfile: Dockerfile
    container_name: ms-notificaciones
    restart: on-failure
    env_file:
      - .env
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-notificaciones:5432/notificaciones_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      EUREKA_URL: http://registry-server:8761/eureka
      EUREKA_APP_NAME: ms-notificaciones
      JWT_PUBLIC_KEY_PATH: file:/deployments/jwt/publicKey.pem
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - jwt-keys:/deployments/jwt
    depends_on:
      db-notificaciones:
        condition: service_healthy
    networks:
      - clinica-network

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: src/main/docker/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      EUREKA_URL: http://registry-server:8761/eureka
      EUREKA_APP_NAME: api-gateway
      JWT_PUBLIC_KEY_PATH: file:/app/jwt/publicKey.pem
      MS_PACIENTES_URL: http://ms-pacientes:8080
    volumes:
      - jwt-keys:/app/jwt
    depends_on:
      - ms-pacientes
      - ms-atencion
    networks:
      - clinica-network

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - api-gateway
    networks:
      - clinica-network

networks:
  clinica-network:
    driver: bridge
