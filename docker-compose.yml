services:
  # ==================== BASES DE DATOS ====================
  db-pacientes:
    image: postgres:16-alpine
    container_name: ms-pacientes-db
    environment:
      POSTGRES_DB: pacientes_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pacientes_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-network

  db-atencion:
    image: postgres:16-alpine
    container_name: ms-atencion-db
    environment:
      POSTGRES_DB: atencion_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d atencion_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-network

  db-recetas:
    image: postgres:16-alpine
    container_name: ms-recetas-db
    environment:
      POSTGRES_DB: recetas_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recetas_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-network

  db-farmacia:
    image: postgres:16-alpine
    container_name: ms-farmacia-db
    environment:
      POSTGRES_DB: farmacia_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmacia_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-network

  db-cobros:
    image: postgres:16-alpine
    container_name: ms-cobros-db
    environment:
      POSTGRES_DB: cobros_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cobros_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-network

  db-notificaciones:
    image: postgres:16-alpine
    container_name: ms-notificaciones-db
    environment:
      POSTGRES_DB: notificaciones_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notificaciones_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hospital-network

  # ==================== INFRAESTRUCTURA ====================
  config-server:
    build:
      context: .
      dockerfile: ms-config-server/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    networks:
      - hospital-network

  registry-server:
    build:
      context: ./ms-registry-server
      dockerfile: Dockerfile
    container_name: registry-server
    ports:
      - "8761:8761"
    networks:
      - hospital-network

  # ==================== MICROSERVICIOS ====================
  ms-pacientes:
    build:
      context: ./ms-pacientes
      dockerfile: Dockerfile
    container_name: ms-pacientes
    restart: on-failure
    ports:
      - "8081:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-pacientes:5432/pacientes_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    depends_on:
      db-pacientes:
        condition: service_healthy
    networks:
      - hospital-network

  ms-atencion:
    build:
      context: ./ms-atencion
      dockerfile: Dockerfile
    container_name: ms-atencion
    restart: on-failure
    ports:
      - "8082:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-atencion:5432/atencion_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    depends_on:
      db-atencion:
        condition: service_healthy
    networks:
      - hospital-network

  ms-recetas:
    build:
      context: ./ms-recetas
      dockerfile: Dockerfile
    container_name: ms-recetas
    restart: on-failure
    ports:
      - "8083:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-recetas:5432/recetas_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    depends_on:
      db-recetas:
        condition: service_healthy
    networks:
      - hospital-network

  ms-farmacia:
    build:
      context: ./ms-farmacia
      dockerfile: Dockerfile
    container_name: ms-farmacia
    restart: on-failure
    ports:
      - "8084:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-farmacia:5432/farmacia_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    depends_on:
      db-farmacia:
        condition: service_healthy
    networks:
      - hospital-network

  ms-cobros:
    build:
      context: ./ms-cobros
      dockerfile: Dockerfile
    container_name: ms-cobros
    restart: on-failure
    ports:
      - "8085:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-cobros:5432/cobros_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    depends_on:
      db-cobros:
        condition: service_healthy
    networks:
      - hospital-network

  ms-notificaciones:
    build:
      context: ./ms-notificaciones
      dockerfile: Dockerfile
    container_name: ms-notificaciones
    restart: on-failure
    ports:
      - "8086:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-notificaciones:5432/notificaciones_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    depends_on:
      db-notificaciones:
        condition: service_healthy
    networks:
      - hospital-network

  # ==================== API GATEWAY ====================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: src/main/docker/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      QUARKUS_HTTP_HOST: 0.0.0.0
      MS_PACIENTES_URL: http://ms-pacientes:8080
      MS_ATENCION_URL: http://ms-atencion:8080
      MS_RECETAS_URL: http://ms-recetas:8080
      MS_FARMACIA_URL: http://ms-farmacia:8080
      MS_COBROS_URL: http://ms-cobros:8080
      MS_NOTIFICACIONES_URL: http://ms-notificaciones:8080
    depends_on:
      - ms-pacientes
      - ms-atencion
    networks:
      - hospital-network

networks:
  hospital-network:
    driver: bridge
