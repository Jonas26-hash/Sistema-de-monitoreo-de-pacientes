quarkus.http.port=8082
quarkus.application.name=ms-atencion
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/pacientes_db
quarkus.hibernate-orm.database.generation=update
paciente-api/mp-rest/url=${MS_PACIENTES_URL:http://localhost:8081}

# Saga outbox
saga.cobros.url=${SAGA_COBROS_URL:http://ms-cobros:8085/eventos/saga}

mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH:META-INF/resources/publicKey.pem}
mp.jwt.verify.issuer=hospital-system
quarkus.http.auth.proactive=false

