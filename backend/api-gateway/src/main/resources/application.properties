# API Gateway Configuration
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Microservices URLs - Usar variable de entorno o fallback local
ms.pacientes.url=${MS_PACIENTES_URL:http://localhost:8081}
ms.atencion.url=${MS_ATENCION_URL:http://localhost:8082}
ms.recetas.url=${MS_RECETAS_URL:http://localhost:8083}
ms.farmacia.url=${MS_FARMACIA_URL:http://localhost:8084}
ms.cobros.url=${MS_COBROS_URL:http://localhost:8085}
ms.notificaciones.url=${MS_NOTIFICACIONES_URL:http://localhost:8086}

# JWT Configuration (validate tokens at gateway level)
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH:META-INF/resources/publicKey.pem}
mp.jwt.verify.issuer=hospital-system
quarkus.http.auth.proactive=false

# SmallRye Fault Tolerance Configuration
mp.fault.tolerance.circuitbreaker.default.requestVolumeThreshold=5
mp.fault.tolerance.circuitbreaker.default.failureRatio=0.5
mp.fault.tolerance.circuitbreaker.default.delay=10000
mp.fault.tolerance.retry.default.maxRetries=3
mp.fault.tolerance.retry.default.delay=500