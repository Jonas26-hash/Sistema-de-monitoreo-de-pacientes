# API Gateway Configuration
quarkus.http.host=0.0.0.0
quarkus.http.port=8080

# Microservices URLs - Usar variable de entorno o fallback local
ms.pacientes.url=${MS_PACIENTES_URL:http://localhost:8081}
ms.atencion.url=${MS_ATENCION_URL:http://localhost:8082}
ms.recetas.url=${MS_RECETAS_URL:http://localhost:8083}
ms.farmacia.url=${MS_FARMACIA_URL:http://localhost:8084}
ms.cobros.url=${MS_COBROS_URL:http://localhost:8085}
ms.notificaciones.url=${MS_NOTIFICACIONES_URL:http://localhost:8086}

# Resilience4j Configuration
resilience4j.circuitbreaker.enabled=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=30s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.retry.enabled=true
resilience4j.retry.configs.default.maxAttempts=3
resilience4j.retry.configs.default.waitDuration=500ms
resilience4j.timeout.enabled=true
resilience4j.timeout.configs.default.timeoutDuration=10s