server.port=8888
spring.application.name=config-server

# Ubicacion de los archivos de configuracion (carpeta central-config)
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=${CENTRAL_CONFIG_PATH:file:../central-config/config-properties}

# Seguridad (desarrollo)
spring.security.user.name=configuser
spring.security.user.password=configpass
